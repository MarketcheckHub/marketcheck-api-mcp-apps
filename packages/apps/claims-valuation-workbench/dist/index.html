    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232735;
      --border: #2e3347;
      --text: #e8eaf0;
      --text-dim: #8b90a5;
      --accent: #5b9cf6;
      --green: #34d399;
      --green-bg: #0d3326;
      --green-border: #166534;
      --yellow: #fbbf24;
      --yellow-bg: #3b2f08;
      --yellow-border: #854d0e;
      --red: #f87171;
      --red-bg: #3b1111;
      --red-border: #991b1b;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
    }
    .workbench { max-width: 1400px; margin: 0 auto; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 .icon { font-size: 26px; }
    .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }

    /* ── Input Section ─────────────────────── */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--mono);
      width: 180px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn-group {
      display: flex;
      gap: 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .btn-group button {
      background: var(--surface2);
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .btn-group button:last-child { border-right: none; }
    .btn-group button:hover { background: var(--border); color: var(--text); }
    .btn-group button.active {
      background: var(--accent);
      color: #fff;
    }

    .evaluate-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 8px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: var(--font);
      height: 38px;
      white-space: nowrap;
    }
    .evaluate-btn:hover { opacity: 0.85; }
    .evaluate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Determination Banner ──────────────── */
    .banner {
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid;
    }
    .banner.not-total {
      background: var(--green-bg);
      border-color: var(--green-border);
    }
    .banner.likely-total {
      background: var(--yellow-bg);
      border-color: var(--yellow-border);
    }
    .banner.total-loss {
      background: var(--red-bg);
      border-color: var(--red-border);
    }
    .banner-icon {
      font-size: 48px;
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .banner.not-total .banner-icon { background: rgba(52,211,153,0.15); color: var(--green); }
    .banner.likely-total .banner-icon { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .banner.total-loss .banner-icon { background: rgba(248,113,113,0.15); color: var(--red); }
    .banner-content { flex: 1; }
    .banner-verdict {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .banner.not-total .banner-verdict { color: var(--green); }
    .banner.likely-total .banner-verdict { color: var(--yellow); }
    .banner.total-loss .banner-verdict { color: var(--red); }
    .banner-amounts {
      display: flex;
      gap: 32px;
      margin-top: 8px;
      font-size: 14px;
    }
    .banner-amounts .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .banner-amounts .value { font-size: 20px; font-weight: 700; font-family: var(--mono); }
    .banner-logic {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    /* ── Grid ──────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .panel-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title .pt-icon { font-size: 16px; }

    /* ── Settlement Range ──────────────────── */
    .range-display {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .range-val { text-align: center; }
    .range-val.center { flex: 1; }
    .range-val .rlabel {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    .range-val .rnum {
      font-size: 16px;
      font-weight: 700;
      font-family: var(--mono);
    }
    .range-val.center .rnum {
      font-size: 28px;
      color: var(--accent);
    }
    .range-bar-container {
      position: relative;
      height: 12px;
      background: var(--surface2);
      border-radius: 6px;
      margin: 8px 0 16px;
      overflow: visible;
    }
    .range-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--text-dim), var(--accent), var(--text-dim));
      border-radius: 6px;
      opacity: 0.6;
    }
    .range-bar-marker {
      position: absolute;
      top: -4px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border: 3px solid var(--bg);
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 8px rgba(91,156,246,0.4);
    }
    .salvage-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 6px;
      margin-top: 8px;
    }
    .salvage-row .slabel { font-size: 13px; color: var(--text-dim); }
    .salvage-row .sval { font-family: var(--mono); font-weight: 600; font-size: 14px; }
    .condition-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Table ─────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--surface2);
      font-family: var(--mono);
      font-size: 12px;
    }
    tr:last-child td { border-bottom: none; }
    .stats-row td {
      font-weight: 700;
      color: var(--accent);
      border-top: 2px solid var(--border);
      border-bottom: none;
      padding-top: 10px;
    }

    .delta-pos { color: var(--green); }
    .delta-neg { color: var(--red); }

    /* ── Replacement Cards ─────────────────── */
    .replacement-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .replacement-card:last-child { margin-bottom: 0; }
    .rc-left { flex: 1; }
    .rc-title { font-weight: 700; font-size: 13px; }
    .rc-details { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .rc-right { text-align: right; }
    .rc-price { font-family: var(--mono); font-weight: 700; font-size: 16px; }
    .rc-distance { font-size: 11px; color: var(--text-dim); }
    .rc-coverage {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 4px;
      display: inline-block;
    }
    .rc-coverage.covered { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .rc-coverage.short { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .comp-table-wrap {
      max-height: 340px;
      overflow-y: auto;
    }
    .comp-table-wrap::-webkit-scrollbar { width: 5px; }
    .comp-table-wrap::-webkit-scrollbar-track { background: var(--surface); }
    .comp-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .hidden { display: none; }
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--text-dim);
      font-size: 16px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; align-items: stretch; }
      .field input { width: 100%; }
    }
